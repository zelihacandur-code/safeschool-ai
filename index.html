<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSchool AI - Yanındayız</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto glass p-6 mb-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">SafeSchool AI 🛡️</h1>
            <p class="text-gray-600 mt-2">Yalnız değilsin, anlatmak seni rahatlatır.</p>
        </header>

        <div id="studentView">
            <label class="block text-sm font-medium text-gray-700 mb-2">Bugün okulda neler oldu? (İsim vermene gerek yok)</label>
            <textarea id="userInput" rows="5" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition-all" placeholder="Buraya yazabilirsin..."></textarea>
            <button onclick="analyzeIncident()" id="sendBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
                Yapay Zeka ile Konuş & Destek Al
            </button>
            <div id="result" class="mt-6 hidden p-4 bg-blue-50 rounded-lg border border-blue-100">
                <p id="aiResponse" class="text-gray-800 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto mt-4 text-center">
        <button onclick="toggleAdmin()" class="text-xs text-gray-400 hover:text-blue-500 underline">Öğretmen Girişi</button>
        <div id="adminPanel" class="hidden mt-4 glass p-4">
            <input type="password" id="adminPass" placeholder="Şifre" class="p-2 border rounded">
            <button onclick="checkAdmin()" class="bg-gray-800 text-white px-4 py-2 rounded ml-2">Giriş</button>
            <div id="reportList" class="mt-4 text-left"></div>
        </div>
    </div>

    <div class="fixed bottom-4 right-4">
        <button onclick="toggleSettings()" class="bg-white p-2 rounded-full shadow-md text-xl">🔑</button>
        <div id="settingsBox" class="hidden absolute bottom-12 right-0 bg-white p-4 shadow-xl rounded-lg border w-64">
            <p class="text-xs mb-2 font-bold">Gemini API Key Girin:</p>
            <input type="password" id="apiKey" class="w-full p-2 border rounded text-sm" placeholder="AIzaSy...">
            <p class="text-[10px] text-gray-400 mt-1">Bu anahtar sadece senin tarayıcında saklanır.</p>
        </div>
    </div>

    <script>
        let reports = [];

        function toggleSettings() { document.getElementById('settingsBox').classList.toggle('hidden'); }
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('hidden'); }

        function checkAdmin() {
            if(document.getElementById('adminPass').value === 'rehber123') {
                alert('Giriş Başarılı! Raporlar listeleniyor.');
                showReports();
            } else { alert('Hatalı şifre!'); }
        }

        async function analyzeIncident() {
            const text = document.getElementById('userInput').value;
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('sendBtn');
            
            if(!text) return alert('Lütfen önce bir şeyler yaz.');
            if(!key) return alert('Lütfen sağ alttaki anahtar simgesinden API Key girin.');

            btn.disabled = true;
            btn.innerText = "Düşünülüyor...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sen bir okul rehberlik asistanısın. Aşağıdaki zorbalık durumunu analiz et. Çocuğa destekleyici, sakinleştirici bir cevap ver. Cevabının sonunda şu formatta teknik analiz yap: [Ciddiyet: 0-10] [Duygu: ...] [Özet: ...]. Durum: ${text}` }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('aiResponse').innerText = aiText;
                
                // Raporu kaydet (Simülasyon)
                reports.push({ date: new Date().toLocaleString(), content: text, analysis: aiText });
            } catch (error) {
                alert('Hata oluştu! API anahtarını kontrol et.');
            } finally {
                btn.disabled = false;
                btn.innerText = "Yapay Zeka ile Konuş & Destek Al";
            }
        }

        function showReports() {
            const list = document.getElementById('reportList');
            list.innerHTML = reports.map(r => `
                <div class="p-3 border-b text-sm">
                    <strong>${r.date}</strong><br>${r.content.substring(0,50)}...
                </div>
            `).join('') || 'Henüz rapor yok.';
        }
    </script>
</body>
</html>
